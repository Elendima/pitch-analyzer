<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisi Pitch Deck</title>
<style>* { box-sizing: border-box; margin: 0; padding: 0; } html { scroll-behavior: smooth; } body { background: #fcfbf8; }</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#a8a29e;font-size:14px">Caricamento…</div></div>
<script>
window.__DATA__ = {"nome_azienda": "Aurelio", "tagline": null, "business": {"problema": "Gli analisti spendono metà della loro settimana lavorativa, circa 30 ore, ricercando manualmente dati operativi attraverso documenti, siti web e archivi, poiché non esiste una piattaforma che copra questi dati in modo completo. Le soluzioni esistenti, come Bloomberg, CapIQ e Refinitiv, si concentrano su dati finanziari e di mercato, ma non mappano catene di fornitura, strutture, esportazioni e clienti.", "soluzione": "Aurelio offre una piattaforma che copre non solo i dati finanziari e di mercato, ma anche l'intero strato operativo delle aziende, fornendo un quadro completo in pochi secondi. Utilizza una tecnologia di ricerca di fatti che restituisce dichiarazioni dirette da miliardi di fonti, aumentando la fiducia nei dati raccolti.", "modello_di_business": "Aurelio genera ricavi attraverso un modello di abbonamento comparabile ai terminali finanziari esistenti. Gli utenti sono analisti finanziari che recuperano il tempo speso in ricerche manuali, mentre le istituzioni finanziarie pagano per l'accesso alla piattaforma."}, "prodotto_tecnologia": {"descrizione": "Gli utenti utilizzano Aurelio per ottenere rapidamente dati operativi e finanziari completi su aziende, riducendo il tempo di ricerca da una settimana a pochi secondi.", "caratteristiche_chiave": ["Copertura completa dei dati operativi", "Ricerca di fatti su miliardi di fonti", "Accesso programmatico per agenti AI"], "stack_tecnologico": "Non dichiarato nel deck.", "differenziatore_tecnologico": "Aurelio si distingue per la sua capacità di mappare dati operativi attraverso una ricerca di fatti su vasta scala, che sembra essere un approccio unico rispetto ai concorrenti che si basano su dati certi e strutturati.", "stadio_di_sviluppo": "MVP"}, "team": {"fondatori": [{"nome": "Federico", "ruolo": "Fondatore", "background": "Ex analista di equity presso un hedge fund long/short, ha esperienza nel reclutamento e nella gestione di team di ricerca. Laureato alla Bocconi e programmatore competitivo con esperienza in MIT ZeroRobotics."}], "valutazione_team": "Il team ha una forte expertise nel dominio finanziario e tecnico, ma sembra mancare di profili commerciali e di vendita. Non è chiaro se ci siano altri membri chiave nel team."}, "mercato": {"settore": "Piattaforme di intelligence di mercato", "sottosettore": "Dati operativi aziendali", "dimensione_mercato": "TAM di 40 miliardi di USD per le piattaforme di intelligence di mercato, con una spesa annuale di 30 miliardi di USD per la ricerca manuale da parte degli analisti.", "tasso_di_crescita": "CAGR del 40% per il mercato dei dati alternativi", "struttura_della_catena_del_valore": "Il mercato è composto da: (1) Fornitori di dati grezzi, (2) Piattaforme di elaborazione dati come Bloomberg e CapIQ, (3) Distributori di dati, (4) Clienti finali come istituzioni finanziarie e analisti.", "posizionamento_nella_catena": "Aurelio si inserisce nella fase di piattaforme di elaborazione dati, ricevendo input da fonti di dati grezzi e vendendo a istituzioni finanziarie e analisti.", "dipendenze_strategiche": "Dipende dall'accesso a fonti di dati grezzi. Un cambiamento nelle condizioni di accesso a queste fonti potrebbe rappresentare un rischio.", "driver_di_mercato": "L'automazione dei flussi di lavoro tramite agenti AI e la crescente domanda di dati operativi strutturati stanno creando il momento giusto per questa soluzione."}, "competizione": {"player_globali": [{"nome": "Bloomberg", "descrizione": "Fornisce dati finanziari e di mercato certi e strutturati. Non copre dati operativi in modo completo come Aurelio."}, {"nome": "CapIQ", "descrizione": "Simile a Bloomberg, offre dati finanziari e di mercato ma non si concentra su dati operativi."}], "player_europei": [], "vantaggio_competitivo_dichiarato": "Aurelio offre una copertura completa dei dati operativi, che le piattaforme esistenti non forniscono.", "valutazione_critica_del_vantaggio": "Il vantaggio sembra reale e difendibile nel breve termine, ma potrebbe essere replicato da player con più risorse se decidessero di espandere la loro offerta."}, "domande_per_il_founder": ["Domanda 1: Quali sono i costi di acquisizione cliente e il tempo di recupero del capitale investito per ogni nuovo cliente?", "Domanda 2: Quali strategie di go-to-market sono state testate finora e quali hanno mostrato risultati promettenti?", "Domanda 3: Come si assicura la qualità e l'affidabilità dei dati operativi raccolti?", "Domanda 4: Perché un player grande come Bloomberg non potrebbe replicare la vostra soluzione in futuro?", "Domanda 5: Come intende colmare la mancanza di competenze commerciali nel team?", "Domanda 6: Quali sono le principali fonti di dati grezzi e come gestite il rischio di dipendenza da queste fonti?", "Domanda 7: Qual è la visione a lungo termine per Aurelio e perché è il momento giusto per questa soluzione?"], "punti_di_attenzione": [{"area": "Competizione", "gravità": "Alta", "descrizione": "Il rischio che player più grandi e con più risorse possano replicare la soluzione di Aurelio è significativo. Il founder deve dimostrare come intende mantenere il vantaggio competitivo."}, {"area": "Team", "gravità": "Media", "descrizione": "La mancanza di profili commerciali e di vendita nel team potrebbe ostacolare la crescita e l'espansione sul mercato. Il founder dovrebbe chiarire come intende affrontare questa lacuna."}], "sintesi": "Aurelio presenta un'opportunità interessante grazie alla sua capacità di coprire dati operativi non mappati dalle piattaforme esistenti, risolvendo un problema significativo per gli analisti. Tuttavia, i rischi principali includono la possibilità che player più grandi possano replicare la soluzione e la mancanza di competenze commerciali nel team. È fondamentale capire come Aurelio intende mantenere il suo vantaggio competitivo e colmare le lacune nel team."};
window.__WEB__  = false;
window.__FILE__ = "aurelio.pdf";
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState } = React;
const D    = window.__DATA__ || {};
const web  = window.__WEB__;
const file = window.__FILE__ || '';

const C = {
  bg:'#fcfbf8', surface:'#fff', border:'#e8e3da',
  t1:'#1c1917', t2:'#57534e', t3:'#a8a29e', dark:'#18181b',
  red:'#dc2626',    redBg:'#fef2f2',    redBr:'#fecaca',
  orange:'#c2410c', orangeBg:'#fff7ed', orangeBr:'#fed7aa',
  green:'#15803d',  greenBg:'#f0fdf4',
  blue:'#1d4ed8',   blueBg:'#eff6ff',
};

const Card = ({children, id}) => (
  <div id={id} style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:16,
    padding:'26px 28px', marginBottom:16, boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
    {children}
  </div>
);

const CardTitle = ({children}) => (
  <div style={{fontSize:11,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',
    color:C.t3,paddingBottom:14,borderBottom:`1px solid ${C.border}`,marginBottom:20}}>
    {children}
  </div>
);

const Field = ({label, children, mt}) => (
  <div style={{marginBottom:20, marginTop:mt||0}}>
    <div style={{fontSize:10,fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase',
      color:C.t3,marginBottom:6}}>{label}</div>
    <div style={{fontSize:14,color:C.t2,lineHeight:1.7}}>{children}</div>
  </div>
);

const Tag = ({children, v='gray'}) => {
  const m = {
    blue:[C.blueBg,C.blue], green:[C.greenBg,C.green],
    orange:[C.orangeBg,C.orange], red:[C.redBg,C.red], gray:['#f4f4f5','#52525b']
  };
  const [bg,color] = m[v]||m.gray;
  return <span style={{display:'inline-block',background:bg,color,borderRadius:6,
    padding:'2px 10px',fontSize:12,fontWeight:600,margin:2}}>{children}</span>;
};

const Pill = ({children, teal}) => (
  <span style={{display:'inline-flex',alignItems:'center',
    background:teal?'#f0fdfa':C.surface, border:`1px solid ${teal?'#99f6e4':C.border}`,
    color:teal?'#0f766e':C.t2, borderRadius:99, padding:'3px 12px',
    fontSize:12, fontWeight:500, marginRight:6}}>{children}</span>
);

function NavBar() {
  const sections = [
    ['business','Business'],['prodotto','Prodotto'],['team','Team'],
    ['mercato','Mercato'],['competizione','Competizione'],
    ['domande','Domande'],['rischi','Rischi'],
  ];
  const [hov, setHov] = useState(null);
  return (
    <div style={{position:'sticky',top:0,zIndex:50,background:'rgba(252,251,248,.92)',
      backdropFilter:'blur(8px)',borderBottom:`1px solid ${C.border}`,padding:'10px 0',marginBottom:24}}>
      <div style={{maxWidth:940,margin:'0 auto',padding:'0 16px',display:'flex',gap:4,overflowX:'auto'}}>
        {sections.map(([id,label]) => (
          <a key={id} href={`#${id}`}
            onMouseEnter={()=>setHov(id)} onMouseLeave={()=>setHov(null)}
            style={{display:'inline-flex',alignItems:'center',padding:'5px 12px',borderRadius:8,
              fontSize:13,fontWeight:500,color:C.t2,textDecoration:'none',whiteSpace:'nowrap',
              background:hov===id?C.border:'transparent',transition:'background .15s'}}>
            {label}
          </a>
        ))}
      </div>
    </div>
  );
}

function Header() {
  const nome = D.nome_azienda||'';
  const tag  = D.tagline||'';
  const date = new Date().toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});
  return (
    <div style={{padding:'40px 0 28px',borderBottom:`1px solid ${C.border}`,marginBottom:28}}>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',
        color:C.t3,marginBottom:10}}>Analisi Pitch Deck</div>
      <h1 style={{fontSize:38,fontWeight:700,letterSpacing:'-.8px',color:C.t1,
        lineHeight:1.15,marginBottom:8}}>{nome}</h1>
      {tag && <div style={{fontSize:16,color:C.t2,marginBottom:12,fontStyle:'italic'}}>"{tag}"</div>}
      <div style={{display:'flex',flexWrap:'wrap',gap:6,alignItems:'center',marginTop:8}}>
        <Pill>{date}</Pill>
        <Pill>GPT-4o</Pill>
        {web && <Pill teal>+ ricerca web</Pill>}
      </div>
    </div>
  );
}

function Synthesis() {
  return (
    <div style={{background:C.dark,borderRadius:16,padding:'28px 30px',marginBottom:16}}>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',
        color:'rgba(255,255,255,.4)',marginBottom:10}}>Sintesi del Partner</div>
      <p style={{fontSize:15,lineHeight:1.8,color:'rgba(255,255,255,.9)'}}>{D.sintesi}</p>
    </div>
  );
}

function BusinessSection() {
  const b = D.business||{};
  return (
    <Card id="business">
      <CardTitle>Business</CardTitle>
      <Field label="Problema">{b.problema}</Field>
      <Field label="Soluzione">{b.soluzione}</Field>
      <Field label="Modello di business" mt={0}>{b.modello_di_business}</Field>
    </Card>
  );
}

function ProductSection() {
  const p = D.prodotto_tecnologia||{};
  const feats = p.caratteristiche_chiave||[];
  return (
    <Card id="prodotto">
      <CardTitle>Prodotto e Tecnologia</CardTitle>
      <Field label="Descrizione">{p.descrizione}</Field>
      <Field label="Caratteristiche chiave">
        <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:4}}>
          {feats.map((f,i)=><Tag key={i} v="green">{f}</Tag>)}
        </div>
      </Field>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <Field label="Stack tecnologico">{p.stack_tecnologico}</Field>
        <Field label="Stadio"><Tag v="orange">{p.stadio_di_sviluppo}</Tag></Field>
      </div>
      <Field label="Differenziatore tecnologico" mt={4}>{p.differenziatore_tecnologico}</Field>
    </Card>
  );
}

function TeamSection() {
  const t = D.team||{};
  const founders = t.fondatori||[];
  return (
    <Card id="team">
      <CardTitle>Team</CardTitle>
      {founders.map((f,i)=>(
        <div key={i} style={{background:C.bg,border:`1px solid ${C.border}`,
          borderRadius:10,padding:16,marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{f.nome}</div>
          <div style={{fontSize:12,color:C.t3,marginBottom:8}}>{f.ruolo}</div>
          <div style={{fontSize:13,color:C.t2,lineHeight:1.6}}>{f.background}</div>
        </div>
      ))}
      <Field label="Valutazione critica" mt={16}>{t.valutazione_team}</Field>
    </Card>
  );
}

function MarketSection() {
  const m = D.mercato||{};
  return (
    <Card id="mercato">
      <CardTitle>Mercato</CardTitle>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
        <div>
          <Field label="Settore">
            <Tag v="blue">{m.settore}</Tag>
            <Tag v="gray">{m.sottosettore}</Tag>
          </Field>
          <Field label="Dimensione mercato">{m.dimensione_mercato}</Field>
          <Field label="Tasso di crescita">{m.tasso_di_crescita}</Field>
          <Field label="Driver di mercato">{m.driver_di_mercato}</Field>
        </div>
        <div>
          <Field label="Struttura catena del valore">{m.struttura_della_catena_del_valore}</Field>
          <Field label="Posizionamento nella catena">{m.posizionamento_nella_catena}</Field>
          <Field label="Dipendenze strategiche">{m.dipendenze_strategiche}</Field>
        </div>
      </div>
    </Card>
  );
}

function CompetitionSection() {
  const c = D.competizione||{};
  const all = [
    ...(c.player_globali||[]).map(p=>({...p,tipo:'Globale'})),
    ...(c.player_europei||[]).map(p=>({...p,tipo:'Europeo'})),
  ];
  return (
    <Card id="competizione">
      <CardTitle>Arena Competitiva</CardTitle>
      <Field label="Vantaggio dichiarato">{c.vantaggio_competitivo_dichiarato}</Field>
      <Field label="Valutazione critica">{c.valutazione_critica_del_vantaggio}</Field>
      {all.length>0 && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:8}}>
          {all.map((p,i)=>(
            <div key={i} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',
                letterSpacing:'.06em',color:C.t3,marginBottom:5}}>{p.tipo}</div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>{p.nome}</div>
              <div style={{fontSize:13,color:C.t2,lineHeight:1.55}}>{p.descrizione}</div>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

function QuestionsSection() {
  const qs = D.domande_per_il_founder||[];
  return (
    <Card id="domande">
      <CardTitle>Domande per il Founder</CardTitle>
      <ol style={{listStyle:'none'}}>
        {qs.map((q,i)=>(
          <li key={i} style={{display:'flex',gap:14,padding:'13px 0',
            borderBottom:i<qs.length-1?`1px solid ${C.border}`:'none',alignItems:'flex-start'}}>
            <span style={{background:C.dark,color:'#fff',fontSize:11,fontWeight:700,
              minWidth:22,height:22,borderRadius:'50%',display:'flex',alignItems:'center',
              justifyContent:'center',flexShrink:0,marginTop:1}}>{i+1}</span>
            <span style={{fontSize:14,color:C.t2,lineHeight:1.7}}>{q}</span>
          </li>
        ))}
      </ol>
    </Card>
  );
}

function FlagsSection() {
  const flags = D.punti_di_attenzione||[];
  return (
    <Card id="rischi">
      <CardTitle>Punti di Attenzione</CardTitle>
      {flags.length===0
        ? <p style={{color:C.t3,fontSize:14}}>Nessun punto critico identificato.</p>
        : flags.map((f,i)=>{
          const g = f.gravità||f.gravita||'Media';
          const alta = g.toLowerCase()==='alta';
          return (
            <div key={i} style={{background:alta?C.redBg:C.orangeBg,
              border:`1px solid ${alta?C.redBr:C.orangeBr}`,
              borderRadius:10,padding:'14px 16px',marginBottom:i<flags.length-1?10:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
                <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',
                  letterSpacing:'.06em',color:alta?C.red:C.orange}}>{f.area}</span>
                <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:4,
                  background:alta?C.redBr:C.orangeBr,color:alta?C.red:C.orange}}>{g}</span>
              </div>
              <div style={{fontSize:13,color:C.t2,lineHeight:1.6}}>{f.descrizione}</div>
            </div>
          );
        })
      }
    </Card>
  );
}

function App() {
  return (
    <div style={{fontFamily:'-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif',
      fontSize:14,lineHeight:'1.65',color:C.t1,background:C.bg,minHeight:'100vh'}}>
      <NavBar />
      <div style={{maxWidth:940,margin:'0 auto',padding:'0 16px 80px'}}>
        <Header />
        <Synthesis />
        <BusinessSection />
        <ProductSection />
        <TeamSection />
        <MarketSection />
        <CompetitionSection />
        <QuestionsSection />
        <FlagsSection />
        <div style={{textAlign:'center',color:C.t3,fontSize:12,marginTop:32}}>
          pitch-analyzer · {file}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
